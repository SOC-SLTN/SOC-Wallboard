# .github/workflows/refresh-threat-data.yml
#
# Fetches ransomware.live on a schedule (server-side, so no CORS and no
# corporate proxy in the way) and commits ransomware.json next to your board.
# The wallboard reads ./ransomware.json same-origin — reachable even if the
# Yodeck player's network blocks external sites.
#
# SETUP
#   1. Put this file at  .github/workflows/refresh-threat-data.yml  in your repo.
#   2. Commit & push.
#   3. Actions tab -> "Refresh threat data" -> "Run workflow" once, so the first
#      ransomware.json exists (otherwise the board falls back and shows DEMO).
#   4. Make sure the board's CONFIG has  localFile: "ransomware.json"  (it does).
#
# If your HTML lives in a subfolder, change the two "ransomware.json" paths below
# to match (e.g. "site/ransomware.json") and the board's localFile accordingly.

name: Refresh threat data

on:
  schedule:
    - cron: "*/30 * * * *"    # every 30 min (UTC). GitHub may delay under load.
  workflow_dispatch:           # adds a manual "Run workflow" button

permissions:
  contents: write              # needed to commit the JSON back

concurrency:
  group: threat-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent ransomware victims
        run: |
          curl -fsSL \
            -H "User-Agent: soc-wallboard" \
            "https://api.ransomware.live/v2/recentvictims" \
          | jq -c '[ .[0:40][] | {victim, group, attackdate, country, activity} ]' \
          > ransomware.json
          echo "Wrote $(jq 'length' ransomware.json) records."

      - name: Commit if changed
        run: |
          git config user.name  "threat-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- ransomware.json; then
            echo "No change — nothing to commit."
          else
            git add ransomware.json
            git commit -m "chore: refresh ransomware.json"
            git push
          fi
